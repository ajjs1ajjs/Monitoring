# PyMon Telegraf Configuration
# Collects system metrics and forwards to PyMon via statsd

[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = ""
  hostname = ""
  omit_hostname = false

# Statsd input for receiving metrics from PyMon agents
[[inputs.statsd]]
  protocol = "udp"
  service_address = ":8125"
  percentiles = [50.0, 90.0, 99.0]
  parse_data_dog_tags = true
  datadog_extensions = false
  allowed_pending_messages = 10000
  percentile_limit = 1000

# CPU metrics
[[inputs.cpu]]
  percpu = true
  totalcpu = true
  collect_cpu_time = false
  report_active = false

# Memory metrics
[[inputs.mem]]

# Disk metrics
[[inputs.disk]]
  ignore_fs = ["tmpfs", "devtmpfs", "devfs", "iso9660", "overlay", "aufs", "squashfs"]

# Disk I/O metrics
[[inputs.diskio]]

# Network metrics
[[inputs.net]]
  interfaces = ["*"]

# Network statistics
[[inputs.netstat]]

# Process stats
[[inputs.processes]]

# System load
[[inputs.system]]

# Kernel metrics
[[inputs.kernel]]

# Swap metrics
[[inputs.swap]]

# Output to file for collection by PyMon
[[outputs.file]]
  files = ["/var/log/telegraf/telegraf.log"]
  data_format = "influx"
