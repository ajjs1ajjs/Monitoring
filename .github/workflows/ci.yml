name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linters
        run: pip install black ruff

      - name: Check formatting
        run: black --check pymon/ --diff || true

      - name: Run Ruff
        run: ruff check pymon/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile Python sources
        run: python -m compileall -q pymon/

      - name: Run tests
        run: python -m pytest -v --tb=short --cov=pymon --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml

  docker:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t pymon:${{ github.sha }} .

      - name: Test Docker image
        run: |
          docker run -d -p 10000:10000 --name pymon --rm \
            -e JWT_SECRET=test-secret-for-ci \
            -e CONFIG_PATH=/app/config.example.yml \
            -e DATA_DIR=/tmp/pymon-data \
            pymon:${{ github.sha }}
          sleep 5
          curl -f http://localhost:10000/api/v1/health || exit 1
          docker stop pymon
