name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  tests:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then echo 'Using pyproject for build' ; fi

      - name: Run tests (Phase 3)
        env:
          PYTHONWARNINGS: ignore
        run: |
          pytest -q tests/test_integration_phase3.py tests/test_integration_phase3_extra.py tests/test_integration_phase3_all.py

  lint:
    name: Lint code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest
      - name: Ruff (lint)
        run: |
          ruff check . --select E,F,W,I,N
      - name: Mypy (type check)
        run: |
          mypy pymon || true
