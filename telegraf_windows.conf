[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = ""
  hostname = ""
  omit_hostname = false

[[outputs.prometheus_client]]
  listen = ":9273"

[[inputs.win_perf_counters]]
  UseWildcardsExpansion = true

  [[inputs.win_perf_counters.object]]
    ObjectName = "Processor"
    Instances = ["*"]
    Counters = ["% Idle Time", "% Processor Time"]
    Measurement = "win_cpu"

  [[inputs.win_perf_counters.object]]
    ObjectName = "LogicalDisk"
    Instances = ["*"]
    Counters = ["% Free Space", "Free Megabytes"]
    Measurement = "win_disk"

  [[inputs.win_perf_counters.object]]
    ObjectName = "Memory"
    Counters = ["Available Bytes"]
    Measurement = "win_mem"

# --- MAPPINGS FOR PYMON COMPATIBILITY ---
[[processors.rename]]
  [[processors.rename.replace]]
    measurement = "win_cpu"
    field = "Percent_Idle_Time"
    rename = "windows_cpu_time_total_idle"
  [[processors.rename.replace]]
    measurement = "win_cpu"
    field = "Percent_Processor_Time"
    rename = "windows_cpu_time_total_all"

[[processors.rename]]
  [[processors.rename.replace]]
    measurement = "win_disk"
    field = "Free_Megabytes"
    rename = "windows_logical_disk_free_bytes"
