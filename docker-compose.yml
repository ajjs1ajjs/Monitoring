version: '3.8'

services:
  telegraf:
    image: telegraf:latest
    container_name: telegraf
    ports:
      - "8125:8125/udp"
    volumes:
      - ./telegraf.conf:/etc/telegraf/telegraf.conf:ro

  pymon:
    image: ghcr.io/ajjs1ajjs/Monitoring:latest
    build: .
    ports:
      - "8090:8090"
    volumes:
      - pymon-data:/data
      - ./config.yml:/config/config.yml
    environment:
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - CONFIG_PATH=/config/config.yml
      - DATA_DIR=/data
      - PYMON_ALLOWED_ORIGINS=http://localhost:8090,https://monitoring.example.com
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/api/v1/health')"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  pymon-data:
